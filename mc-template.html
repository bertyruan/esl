<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>填空练习</title>
    <style>
      :root {
        --box-size: 110px;
        --accent: #9575cd;
        --success: #4caf50;
        --error: #f44336;
        --highlight: #ffff00;
      }
      body {
        font-family: "Comic Sans MS", sans-serif;
        background: #fce4ec;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: 60px;
      }

      #feedbackBanner {
        position: fixed;
        top: -100px;
        left: 0;
        width: 100%;
        padding: 15px;
        text-align: center;
        color: white;
        font-weight: bold;
        transition: 0.5s;
        z-index: 1000;
      }
      #feedbackBanner.show {
        top: 0;
      }

      .header-ui {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 20px;
        background: white;
        padding: 10px 25px;
        border-radius: 50px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }

      /* Updated Dropdown CSS */
      .header-ui select {
        appearance: none;
        -webkit-appearance: none;
        background-color: white;
        border: 2px solid var(--accent);
        border-radius: 20px;
        padding: 8px 35px 8px 15px;
        font-family: inherit;
        font-weight: bold;
        color: var(--accent);
        cursor: pointer;
        outline: none;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239575CD' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 10px center;
        background-size: 15px;
      }

      .star-gui {
        color: #ffd600;
        font-size: 1.5rem;
        letter-spacing: 5px;
      }
      .main-card {
        background: white;
        padding: 30px;
        border-radius: 30px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 95%;
        max-width: 800px;
        text-align: center;
      }

      /* Highlighting Styles */
      .sentence-display {
        line-height: 3;
        font-size: 1.8rem;
        margin-bottom: 20px;
      }
      .word-span {
        padding: 0 5px;
        border-radius: 8px;
        transition: background 0.3s;
        display: inline-block;
      }
      .word-span.active {
        background-color: var(--highlight);
        transform: scale(1.1);
      }

      .blank-box {
        display: inline-block;
        min-width: var(--box-size);
        height: 50px;
        border: 3px dashed #bdbdbd;
        border-radius: 12px;
        vertical-align: middle;
        margin: 0 8px;
        line-height: 50px;
        background: #fafafa;
        transition: 0.2s;
        cursor: pointer;
      }
      .blank-box.active {
        background-color: var(--highlight);
        border-color: #fbc02d;
      }
      .blank-box.correct {
        border-color: var(--success);
        background: #e8f5e9;
        color: #2e7d32;
        border-style: solid;
      }
      .blank-box.incorrect {
        border-color: var(--error);
        background: #ffebee;
      }

      .choices-pool {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin: 25px 0;
      }
      .choice-item {
        padding: 12px 22px;
        background: var(--accent);
        color: white;
        border-radius: 15px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.1s;
      }
      .choice-item.selected-choice {
        outline: 4px solid #ffd600;
        background: #673ab7;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 15px;
        align-items: center;
      }
      .audio-buttons {
        display: flex;
        gap: 10px;
        display: none; /* Hidden by default */
        gap: 10px;
        margin-bottom: 10px;
      }
      .audio-buttons.visible {
        display: flex; /* Shown when validated */
        animation: fadeIn 0.5s;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .btn {
        padding: 12px 25px;
        border-radius: 50px;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }
      .btn-audio {
        background: #ff8a65;
        color: white;
      }
      .btn-natural {
        background: #4fc3f7;
        color: white;
      }
      .btn-submit {
        background: var(--success);
        color: white;
        font-size: 1.2rem;
        padding: 15px 45px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div id="feedbackBanner"></div>

    <div class="header-ui">
      <select id="qSelect" onchange="handleDropdownChange(this.value)"></select>
      <div id="starContainer" class="star-gui"></div>
    </div>

    <div class="main-card">
      <div id="sentenceArea" class="sentence-display"></div>

      <div class="controls">
        <div class="audio-buttons">
          <button class="btn btn-audio" onclick="playStepAudio()">
            🔊 逐词朗读 (Step)
          </button>
          <button class="btn btn-natural" onclick="playNaturalAudio()">
            🍃 自然朗读 (Natural)
          </button>
        </div>
        <div id="choicesArea" class="choices-pool"></div>
        <button class="btn btn-submit" onclick="validateAnswers()">
          提交答案 (Submit)
        </button>
      </div>
    </div>

    <button
      onclick="window.location.href = 'index.html'"
      style="
        margin-top: 30px;
        background: none;
        border: none;
        color: #888;
        cursor: pointer;
      "
    >
      🏠 返回主页
    </button>

    <script>
      // Data Structure Updated
      // Example: { sentence: [...], blanks: [1], choices: [...], answers: [1], audio_file: "...", natural_audio_file: "..." }
      const questions = JSON.parse(localStorage.getItem("mcData")) || [];
      let currentIdx = 0;
      let isFirstTry = true;
      let starsEarned = new Array(questions.length).fill(false);
      let selectedChoiceText = null;
      let highlightTimer = null;

      const audio = new Audio();
      const naturalAudio = new Audio();

      const qSelect = document.getElementById("qSelect");
      const sentenceArea = document.getElementById("sentenceArea");
      const choicesArea = document.getElementById("choicesArea");
      const starContainer = document.getElementById("starContainer");
      const banner = document.getElementById("feedbackBanner");

      function initPage() {
        const qSelect = document.getElementById("qSelect");

        if (questions.length === 0) {
          document.querySelector(".main-card").innerHTML =
            "<h2>未发现题目，请返回主页选择。</h2>";
          return;
        }

        // Populate Dropdown
        qSelect.innerHTML = ""; // Clear existing
        questions.forEach((q, i) => {
          let opt = document.createElement("option");
          opt.value = i;
          opt.textContent = `练习 ${i + 1}`;
          qSelect.appendChild(opt);
        });

        // Load the very first question
        loadQuestion(0);
      }

      function handleDropdownChange(index) {
        // Stop any audio/highlighting from the previous question immediately
        stopHighlighting();
        audio.pause();
        naturalAudio.pause();

        // Load the new question
        loadQuestion(parseInt(index));
      }

      function loadQuestion(index) {
        currentIdx = index;
        isFirstTry = true;
        selectedChoiceText = null;

        // UI Reset
        const sentenceArea = document.getElementById("sentenceArea");
        const choicesArea = document.getElementById("choicesArea");
        const audioGroup = document.querySelector(".audio-buttons");

        sentenceArea.innerHTML = "";
        choicesArea.innerHTML = "";
        audioGroup.classList.remove("visible"); // Hide audio buttons for new question

        const q = questions[currentIdx];

        // Set Audio Sources
        audio.src = q.audio_file || "";
        naturalAudio.src = q.natural_audio_file || "";

        // Render Sentence
        q.sentence.forEach((word, i) => {
          const span = document.createElement("span");
          span.id = `word-${i}`;

          if (q.blanks.includes(i)) {
            span.className = "blank-box";
            span.dataset.blankIndex = q.blanks.indexOf(i);
            span.onclick = function () {
              handleBoxClick(this);
            };
          } else {
            span.className = "word-span";
            span.textContent = word + " ";
          }
          sentenceArea.appendChild(span);
        });

        // Render Choices
        q.choices.forEach((choice) => {
          const item = document.createElement("div");
          item.className = "choice-item";
          item.textContent = choice;
          item.onclick = function () {
            handleChoiceSelect(this);
          };
          choicesArea.appendChild(item);
        });

        renderStars();
      }

      // --- Highlighting Logic ---
      function playStepAudio() {
        stopHighlighting();
        // Start audio immediately (audio_file) but logic handles visual delay
        audio.play();

        let wordIndex = 0;
        const totalWords = questions[currentIdx].sentence.length;

        // 1 Second Initial Delay
        highlightTimer = setTimeout(function runHighlight() {
          // Clear previous highlight
          document
            .querySelectorAll(".word-span, .blank-box")
            .forEach((el) => el.classList.remove("active"));

          if (wordIndex < totalWords) {
            const currentEl = document.getElementById(`word-${wordIndex}`);
            currentEl.classList.add("active");

            wordIndex++;
            highlightTimer = setTimeout(runHighlight, 1000);
          } else {
            stopHighlighting();
          }
        }, 1000);
      }

      function stopHighlighting() {
        clearTimeout(highlightTimer);
        document
          .querySelectorAll(".word-span, .blank-box")
          .forEach((el) => el.classList.remove("active"));
      }

      function playNaturalAudio() {
        stopHighlighting();
        naturalAudio.play();
      }

      // --- Interaction Logic ---
      function handleChoiceSelect(element) {
        document
          .querySelectorAll(".choice-item")
          .forEach((el) => el.classList.remove("selected-choice"));
        element.classList.add("selected-choice");
        selectedChoiceText = element.textContent;
      }

      function handleBoxClick(box) {
        if (box.classList.contains("correct")) return;
        if (selectedChoiceText) {
          box.textContent = selectedChoiceText;
          box.classList.remove("incorrect");
          selectedChoiceText = null;
          document
            .querySelectorAll(".choice-item")
            .forEach((el) => el.classList.remove("selected-choice"));
        }
      }

      function validateAnswers() {
        const q = questions[currentIdx];
        const boxes = document.querySelectorAll(".blank-box");
        let allCorrect = true;

        document.querySelector(".audio-buttons").classList.add("visible");

        boxes.forEach((box) => {
          const blankIdx = parseInt(box.dataset.blankIndex);
          const correctText = q.choices[q.answers[blankIdx]];
          if (box.textContent.trim() === correctText) {
            box.className = "blank-box correct";
          } else {
            box.className = "blank-box incorrect";
            allCorrect = false;
            setTimeout(() => {
              if (box.classList.contains("incorrect")) {
                box.textContent = "";
                box.classList.remove("incorrect");
              }
            }, 1200);
          }
        });

        if (allCorrect) {
          if (isFirstTry && !starsEarned[currentIdx]) {
            starsEarned[currentIdx] = true;
            renderStars();
            showBanner("🌟 完美！第一遍就全对了！", "success");
          } else {
            showBanner("✅ 回答正确！", "success");
          }
        } else {
          showBanner("❌ 还有错误，再试一次吧", "error");
          isFirstTry = false;
        }
      }

      function showBanner(text, type) {
        banner.textContent = text;
        banner.className = "show";
        banner.style.backgroundColor =
          type === "success" ? "var(--success)" : "var(--error)";
        setTimeout(() => {
          banner.className = "";
        }, 3000);
      }

      function renderStars() {
        starContainer.innerHTML = starsEarned
          .map((e) => (e ? "⭐" : "☆"))
          .join("");
      }

      window.onload = initPage;
    </script>
  </body>
</html>
