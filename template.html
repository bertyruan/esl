<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习时间</title>
    <style>
      :root {
        --accent: #ff8a80;
        --highlight: #ffff00;
        --soft-blue: #e1f5fe;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--soft-blue);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Navigation Styles */
      .nav-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        width: 100%;
        max-width: 600px;
      }
      select {
        flex-grow: 1;
        padding: 12px;
        border-radius: 12px;
        border: 2px solid #03a9f4;
        font-size: 1rem;
      }

      /* Main UI Card */
      .main-display {
        background: white;
        padding: 40px;
        border-radius: 30px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 95%;
        max-width: 600px;
      }
      .lesson-img {
        width: 250px;
        height: 250px;
        object-fit: contain;
        border-radius: 20px;
        margin-bottom: 20px;
        border: 5px solid #f0f0f0;
        background: #f0f0f0
          url('data:image/svg+xml;charset=utf8,<svg xmlns="http://www.w3.org/2000/svg"><text x="50%" y="50%" transition=".5s" font-family="sans-serif" font-size="14" fill="%23999" text-anchor="middle">加载中...</text></svg>')
          no-repeat center;
      }

      /* Highlighting Styles */
      .phrase-container {
        font-size: 4rem;
        margin: 30px 0;
        font-weight: bold;
        min-height: 1.2em;
      }
      .char {
        /* padding: 0 4px; */
        border-radius: 8px;
        display: inline-block;
        transition: all 0.2s;
      }
      .active {
        background-color: var(--highlight);
        transform: scale(1.1);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      /* Buttons */
      .controls {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn {
        padding: 15px 25px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
        transition: 0.2s;
      }
      .btn:active {
        transform: translateY(3px);
      }
      .btn-blue {
        background: #03a9f4;
        color: white;
      }
      .btn-green {
        background: #4caf50;
        color: white;
      }
      .btn-red {
        background: #ff5252;
        color: white;
      }
      .btn .back {
        color: gray;
      }
      a.back {
        margin-top: 1rem;
        text-decoration: none;
        width: max-content;
        height: max-content;
      }

      .toggle-section {
        margin-top: 25px;
        padding-top: 20px;
        border-top: 2px dashed #ddd;
      }
    </style>
  </head>
  <body>
    <div class="nav-bar">
      <button class="btn btn-blue" onclick="changePhrase(-1)">上一个</button>
      <select id="phraseSelect" onchange="jumpToPhrase(this.value)"></select>
      <button class="btn btn-blue" onclick="changePhrase(1)">下一个</button>
    </div>

    <div class="main-display">
      <img id="displayImg" class="lesson-img" src="" alt="Lesson Image" />
      <div id="phraseArea" class="phrase-container"></div>

      <div class="controls">
        <button id="playBtn" class="btn btn-green" onclick="replayAudio()">
          ▶️ 播放
        </button>
        <button style="display: none" pauseBtn" class="btn btn-blue" onclick="pauseAudio()">
          ⏸ 暂停
        </button>
        <button style="display: none" class="btn btn-red" onclick="replayAudio()">🔄 重读</button>
      </div>

      <div class="toggle-section">
        <label style="cursor: pointer">
          <input type="checkbox" id="highlightToggle" checked /> 启用高亮同步
        </label>
      </div>

      <div style="margin-top: 1rem">
        <a href="./index.html"> <button class="btn back">返回</button></a>
      </div>
    </div>

    <!-- Hidden container for preloading every image at once -->
    <div id="preloader" style="display: none;"></div>

    <script>
      // Get data from localStorage
      const phrasesData =
        JSON.parse(localStorage.getItem("currentLesson")) || [];
      console.log(phrasesData);
      let currentIndex = 0;
      let highlightPointer = -1;
      let timer = null;
      const audio = new Audio();

      const phraseSelect = document.getElementById("phraseSelect");
      const phraseArea = document.getElementById("phraseArea");
      const displayImg = document.getElementById("displayImg");
      const highlightToggle = document.getElementById("highlightToggle");

      // Populate dropdown
      phrasesData.forEach((item, idx) => {
        let opt = document.createElement("option");
        opt.value = idx;
        opt.textContent = `单词 ${idx + 1}: ${item[0].join("")}`;
        phraseSelect.appendChild(opt);
      });

      function loadPhrase(index) {
        // Reset everything for the new phrase
        stopHighlighting();
        audio.pause();

        currentIndex = index;
        phraseSelect.value = index;
        const data = phrasesData[index];
        const letters = data[0]; // The list of strings
        console.log(data[1]);
        const audioSrc = data[1];
        const imgSrc = data[2];

        // Reset opacity before changing source to trigger a new fade
        if (data[2]) {
            displayImg.src = data[2];
            displayImg.style.display = "inline-block";
        } else {
            displayImg.style.display = "none";
        }

        displayImg.style.display = imgSrc ? "inline-block" : "none";
        // Update UI
        displayImg.src = imgSrc || "";
        displayImg.style.display = imgSrc ? "inline-block" : "none";
        audio.src = audioSrc;
        highlightPointer = -1;

        // Render letters
        phraseArea.innerHTML = "";
        letters.forEach((char, i) => {
          let span = document.createElement("span");
          span.textContent = char;
          span.className = "char";
          span.id = `char-${i}`;
          // If it's a space, ensure it has width
          if (char === " ") span.innerHTML = "&nbsp;";
          phraseArea.appendChild(span);
        });
      }

      function playAudio() {
        audio.play();
        // Start the highlight logic immediately; it handles the 1s delay internally
        if (highlightToggle.checked) {
          runHighlightCycle();
        }
      }

      function pauseAudio() {
        audio.pause();
        stopHighlighting();
      }

      function replayAudio() {
        audio.pause();
        audio.currentTime = 0;
        stopHighlighting();
        highlightPointer = -1;
        // Clear visual highlights
        document
          .querySelectorAll(".char")
          .forEach((el) => el.classList.remove("active"));
        playAudio();
      }

      function stopHighlighting() {
        clearTimeout(timer);
        timer = null;
      }

      function runHighlightCycle() {
        if (timer) return; // Prevent multiple timers

        // Initial 1-second pause when audio starts (per requirement)
        if (highlightPointer === -1) {
          timer = setTimeout(() => {
            highlightPointer = 0;
            applyHighlight();
          }, 1000);
        } else {
          applyHighlight();
        }
      }

      function applyHighlight() {
        const currentLetters = phrasesData[currentIndex][0];

        // Remove previous highlight
        document
          .querySelectorAll(".char")
          .forEach((el) => el.classList.remove("active"));

        if (highlightPointer < currentLetters.length) {
          const currentChar = currentLetters[highlightPointer];
          const element = document.getElementById(`char-${highlightPointer}`);

          if (currentChar === " " || currentChar === "") {
            // It's a space: No highlight, wait 1 second
            timer = setTimeout(() => {
              highlightPointer++;
              applyHighlight();
            }, 1000);
          } else {
            // It's text: Highlight, wait 1 second
            if (element) element.classList.add("active");
            timer = setTimeout(() => {
              highlightPointer++;
              applyHighlight();
            }, 1000);
          }
        } else {
          stopHighlighting();
        }
      }

      function changePhrase(dir) {
        let next = currentIndex + dir;
        if (next >= 0 && next < phrasesData.length) {
          loadPhrase(next);
        }
      }

      function jumpToPhrase(val) {
        loadPhrase(parseInt(val));
      }

      // Event listener for toggle: if turned off while playing, stop highlighting
      highlightToggle.onchange = () => {
        if (!highlightToggle.checked) stopHighlighting();
        else if (!audio.paused) runHighlightCycle();
      };

      // Auto-stop when audio finishes
      audio.onended = () => {
        stopHighlighting();
      };

      function preloadAllImages() {
        const preloader = document.getElementById('preloader');
      
          phrasesData.forEach((item) => {
              const imgSrc = item[2]; // Index 2 is the image string
              if (imgSrc && imgSrc.trim() !== "") {
                  const img = new Image(); // Create a new image object in memory
                  img.src = imgSrc;        // Setting src triggers immediate download
                  preloader.appendChild(img); // Adding to DOM ensures browser prioritizes it
              }
          });
      }

      // Initialize first phrase
      if (phrasesData.length > 0) {
        preloadAllImages();
        loadPhrase(0);
      }

    </script>
  </body>
</html>
