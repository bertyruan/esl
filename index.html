<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的英语乐园</title>
    <style>
      :root {
        --primary: #ffb74d;
        --secondary: #4fc3f7;
        --text: #5d4037;
      }
      body {
        font-family: "Comic Sans MS", cursive, sans-serif;
        background: #fff9c4;
        color: var(--text);
        margin: 0;
        padding: 20px;
      }
      h1 {
        text-align: center;
        color: #f57c00;
        font-size: 2.5rem;
      }
      .card-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        max-width: 1000px;
        margin: 0 auto;
      }
      .card {
        background: white;
        border-radius: 20px;
        border: 4px solid var(--primary);
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.2s;
        text-align: center;
      }
      .card:hover {
        transform: scale(1.05);
      }
      .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
      }
      .card h2 {
        padding: 10px;
        margin: 0;
        background: var(--primary);
        color: white;
      }

      .lazy-img {
        opacity: 0;
        transition: opacity 0.5s ease-in;
      }

      /* When the image finishes downloading, we make it visible */
      .lazy-img[src] {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <h1>🌟 英语学习乐园 🌟</h1>
    <div class="card-container" id="cardGrid"></div>

    <script>
      // Data structure provided
      const plurals = "wig, rag, bag, cup, hat, pot, bed, kid"
        .split(", ")
        .map((x) => {
          let a = x.split("");
          a[a.length - 1] = `${a[a.length - 1]}s`;
          console.log(a.join(""));
          return [a, `./audio/${a.join("")}.m4a`, `./images/${x}.webp`];
        });
      const ePractice = "bed, pen, pet, wet, hen, red, ten"
        .split(", ")
        .map((x) => [x.split(""), `./audio/${x}.m4a`, `./images/${x}.webp`]);
      ePractice[1][0] = ["p", "en"];
      ePractice[4][0] = ["h", "en"];
      ePractice[6][0] = ["t", "en"];

      const mcQuestions = [
        {
          sentence: ["The", "cat", "is", "sleeping", "on", "the", "mat"],
          blanks: [1, 3], // "cat" and "sleeping" will be boxes
          choices: ["dog", "cat", "running", "sleeping", "bird"],
          answers: [1, 3], // index 1 (cat) for the first blank, index 3 (sleeping) for the second
          audio_file: "./audio/wigs.m4a",
          natural_audio_file: "./audio/ten.m4a",
        },
      ];

      // In your card click logic:
      // localStorage.setItem('mcData', JSON.stringify(mcQuestions));
      // window.location.href = "mc-template.html";

      const pluralsCard = {
        image: "./images/pot.webp",
        link: "template.html",
        title: "复数 练习",
        phrases: plurals,
      };
      const eCard = {
        image: "./images/bed.webp",
        link: "template.html",
        title: "短 e 音练习",
        phrases: ePractice,
      };
      const tohaveCardTest = {
        image: "./images/pet.webp",
        link: "mc-template.html",
        title: "有和复数练习",
      };

      const cards = [pluralsCard, eCard, tohaveCardTest];

      const questions = [
        ["audio/pet.m4a", ["Dog", "Pet", "Cat"], 1], // Answer is index 1 (Pet)
        ["audio/morning.m4a", ["Morning", "Night", "Afternoon"], 0],
      ];
      localStorage.setItem("testData", JSON.stringify(questions));
      localStorage.setItem("mcData", JSON.stringify(mcQuestions));

      const grid = document.getElementById("cardGrid");
      cards.forEach((card) => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
                <img src="${card.image}" alt="${card.title}" loading="lazy"
                class="lazy-img">
                <h2>${card.title}</h2>
            `;
        div.onclick = () => {
          // Save specific lesson data to local storage for the template page
          localStorage.setItem("currentLesson", JSON.stringify(card.phrases));
          window.location.href = card.link;
        };
        grid.appendChild(div);
      });
    </script>
  </body>
</html>
