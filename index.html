<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的英语乐园</title>
    <style>
      :root {
        --primary: #ffb74d;
        --secondary: #4fc3f7;
        --text: #5d4037;
      }
      body {
        font-family: "Comic Sans MS", cursive, sans-serif;
        background: #fff9c4;
        color: var(--text);
        margin: 0;
        padding: 20px;
      }
      h1 {
        text-align: center;
        color: #f57c00;
        font-size: 2.5rem;
      }
      .card-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        max-width: 1000px;
        margin: 0 auto;
      }
      .card {
        background: white;
        border-radius: 20px;
        border: 4px solid var(--primary);
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.2s;
        text-align: center;
      }
      .card:hover {
        transform: scale(1.05);
      }
      .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
      }
      .card h2 {
        padding: 10px;
        margin: 0;
        background: var(--primary);
        color: white;
      }

      .lazy-img {
        opacity: 0;
        transition: opacity 0.5s ease-in;
      }

      /* When the image finishes downloading, we make it visible */
      .lazy-img[src] {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <h1>🌟 英语学习乐园 🌟</h1>
    <div class="card-container" id="cardGrid"></div>

    <script>
      function renderCards(cards) {
        const grid = document.getElementById("cardGrid");
        Object.keys(cards).forEach((name) => {
          const card = cards[name];
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
                  <img src="./images/${card.image}" alt="${card.title}" loading="lazy"
                  class="lazy-img">
                  <h2>${card.title}</h2>
              `;
          div.onclick = () => {
            // Save specific lesson data to local storage for the template page
            localStorage.setItem("currentLesson", JSON.stringify(card));
            window.location.href = card.link;
          };
          grid.appendChild(div);
        });
      }

      // Function to load the JSON data
      async function loadWebsiteData() {
        try {
          // Fetch the external JSON file
          const data = await fetch("./data/multipleChoice.json");
          const cards = await data.json();

          // Store it in localStorage so the template pages can see it
          // localStorage.setItem("mcData", JSON.stringify(cards));

          // Call the function to render your cards (Lesson Selection)
          renderCards(cards);
        } catch (error) {
          console.error("Error loading JSON data:", error);
          document.body.innerHTML +=
            "<p style='color:red; text-align:center;'>无法加载数据。请确保使用了服务器环境运行 (Live Server)。</p>";
        }
      }

      window.onload = loadWebsiteData;
    </script>
  </body>
</html>
