<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Word Audio Player | Local Files</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background: linear-gradient(145deg, #f5f7fc 0%, #eef2f6 100%);
        font-family: system-ui, -apple-system, "Segoe UI", "Roboto",
          "Helvetica Neue", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .card {
        max-width: 680px;
        width: 100%;
        background: rgba(255, 255, 255, 0.96);
        border-radius: 56px;
        box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25),
          0 2px 8px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      .container {
        padding: 2rem 1.8rem 2.2rem;
      }

      /* section 1: dropdown */
      .selector-section {
        margin-bottom: 2rem;
      }

      .selector-label {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 600;
        color: #4a5b6e;
        margin-bottom: 0.6rem;
        display: block;
      }

      .custom-select {
        width: 100%;
        padding: 0.9rem 1.2rem;
        font-size: 1rem;
        font-weight: 500;
        background-color: #ffffff;
        border: 2px solid #e2e8f0;
        border-radius: 44px;
        appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%233b4b5e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
        background-repeat: no-repeat;
        background-position: right 1.2rem center;
        background-size: 1.2rem;
        cursor: pointer;
        transition: all 0.2s;
        color: #1e293b;
      }

      .custom-select:focus {
        outline: none;
        border-color: #8b5cf6;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
      }

      /* section 2: prev/next buttons */
      .nav-section {
        display: flex;
        gap: 1rem;
        margin-bottom: 2.2rem;
      }

      .nav-btn {
        flex: 1;
        background: #ffffff;
        border: 1.5px solid #e2e8f0;
        border-radius: 60px;
        padding: 0.8rem 0;
        font-weight: 600;
        font-size: 1rem;
        color: #2c3e4e;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background-color: #fefefe;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      }

      .nav-btn:hover:not(:disabled) {
        background-color: #f1f5f9;
        border-color: #cbd5e1;
        transform: scale(0.98);
      }

      .nav-btn:active:not(:disabled) {
        background-color: #e6edf4;
        transform: scale(0.96);
      }

      .nav-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* main display area */
      .word-display {
        background: linear-gradient(135deg, #fafcff 0%, #ffffff 100%);
        border-radius: 48px;
        padding: 2rem 1.5rem;
        margin-bottom: 1.8rem;
        text-align: center;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02),
          0 12px 20px -12px rgba(0, 0, 0, 0.1);
        border: 1px solid rgba(148, 163, 184, 0.15);
      }

      .current-word {
        font-size: clamp(2.4rem, 10vw, 4.5rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(120deg, #0f172a, #334155);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        margin-bottom: 1.2rem;
        word-break: break-word;
      }

      /* audio control buttons */
      .audio-controls {
        display: flex;
        justify-content: center;
        gap: 1.2rem;
        flex-wrap: wrap;
        margin-top: 0.8rem;
      }

      .audio-btn {
        background: white;
        border: none;
        padding: 0.8rem 1.6rem;
        border-radius: 60px;
        font-size: 1rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        border: 1px solid #e9eef3;
        color: #1e293b;
      }

      .audio-btn:active {
        transform: scale(0.94);
      }

      .play-btn {
        background: #8b5cf6;
        border-color: #7c3aed;
        color: white;
        box-shadow: 0 6px 14px rgba(139, 92, 246, 0.3);
      }

      .play-btn:hover {
        background: #7c3aed;
        transform: translateY(-2px);
      }

      .pause-btn {
        background: #f8fafc;
      }

      .pause-btn:hover {
        background: #f1f5f9;
      }

      .replay-btn {
        background: #f8fafc;
      }

      .replay-btn:hover {
        background: #f1f5f9;
      }

      .audio-status {
        font-size: 0.75rem;
        color: #6c7a8e;
        margin-top: 1rem;
        text-align: center;
      }

      /* local file hint */
      .local-hint {
        background: #f1f4f9;
        border-radius: 20px;
        padding: 0.6rem 1rem;
        margin-top: 1rem;
        font-size: 0.7rem;
        color: #4b5563;
        text-align: center;
        border: 1px solid #e2e8f0;
      }

      .local-hint code {
        background: #e2e8f0;
        padding: 0.2rem 0.4rem;
        border-radius: 12px;
        font-family: monospace;
        font-size: 0.7rem;
      }

      @media (max-width: 550px) {
        .container {
          padding: 1.5rem 1.2rem;
        }
        .audio-btn {
          padding: 0.65rem 1.2rem;
          font-size: 0.9rem;
        }
        .audio-controls {
          gap: 0.8rem;
        }
        .nav-btn {
          padding: 0.65rem 0;
          font-size: 0.9rem;
        }
        .word-display {
          padding: 1.5rem 1rem;
        }
      }

      button:focus-visible,
      select:focus-visible {
        outline: 2px solid #8b5cf6;
        outline-offset: 2px;
      }

      footer {
        text-align: center;
        font-size: 0.7rem;
        color: #94a3b8;
        margin-top: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="container">
        <!-- Section 1: Dropdown menu listing all words -->
        <div class="selector-section">
          <span class="selector-label">📖 SELECT WORD</span>
          <select
            id="wordDropdown"
            class="custom-select"
            aria-label="Word list dropdown"
          ></select>
        </div>

        <!-- Section 2: Previous / Next buttons -->
        <div class="nav-section">
          <button id="prevBtn" class="nav-btn" aria-label="Previous word">
            ◀ Previous
          </button>
          <button id="nextBtn" class="nav-btn" aria-label="Next word">
            Next ▶
          </button>
        </div>

        <!-- Section 3: Main UI - current word + local audio controls -->
        <div class="word-display">
          <div class="current-word" id="currentWordDisplay">—</div>
          <div class="audio-controls">
            <button id="playAudioBtn" class="audio-btn play-btn">▶ Play</button>
            <button id="pauseAudioBtn" class="audio-btn pause-btn">
              ⏸ Pause
            </button>
            <button id="replayAudioBtn" class="audio-btn replay-btn">
              ⟳ Replay
            </button>
          </div>
          <div id="audioStatusMsg" class="audio-status">
            🎵 Local audio ready
          </div>
          <div class="local-hint">
            💡 <strong>Local audio files</strong><br />
            Each word uses a local file path (e.g.,
            <code>./audio/word.mp3</code>).<br />
            Place your audio files in the <code>audio/</code> folder or update
            the paths below.
          </div>
        </div>
        <footer>
          Plays from local file system • Update paths to match your audio files
        </footer>
      </div>
    </div>

    <script>
      // ==================================================================
      // DATA STRUCTURE: list named 'words' containing [word, audio_file]
      // audio_file is now a LOCAL FILE PATH (relative or absolute)
      // ==================================================================
      // IMPORTANT: Replace these paths with your actual local audio files.
      // Example: "./audio/cat.mp3", "../sounds/dog.wav", "/media/hello.ogg"
      // For demo purposes, I'm using relative paths that you can customize.
      // To make this fully functional, create an "audio" folder and place files.
      // ==================================================================

      const words = [
        ["rag", "./audio/1.m4a"],
        ["Ephemeral", "./audio/ephemeral.mp3"],
        ["Luminous", "./audio/luminous.mp3"],
        ["Mellifluous", "./audio/mellifluous.mp3"],
        ["Resilience", "./audio/resilience.mp3"],
      ];

      // ----- Helper: Check if running in a local file environment -----
      // Provide fallback instructions if files don't exist.

      // ----- Application State -----
      let currentIndex = 0; // index of currently selected word
      let audioPlayer = null; // HTMLAudioElement instance
      let currentAudioSrc = null; // store current src path

      // DOM elements
      const dropdown = document.getElementById("wordDropdown");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const currentWordDisplay = document.getElementById("currentWordDisplay");
      const playBtn = document.getElementById("playAudioBtn");
      const pauseBtn = document.getElementById("pauseAudioBtn");
      const replayBtn = document.getElementById("replayAudioBtn");
      const audioStatusMsg = document.getElementById("audioStatusMsg");

      // Helper: update status message with optional error styling
      function setStatusMessage(msg, isError = false) {
        audioStatusMsg.textContent = msg;
        audioStatusMsg.style.color = isError ? "#e11d48" : "#4b5563";
        if (!isError) {
          // revert after 2.5 seconds only if message hasn't changed
          setTimeout(() => {
            if (audioStatusMsg.textContent === msg) {
              audioStatusMsg.style.color = "#6c7a8e";
            }
          }, 2500);
        }
      }

      // Helper: Get clean file name from path for debugging
      function getFileNameFromPath(path) {
        return path.split("/").pop();
      }

      // Load a local audio file into the player
      // Completely rewritten to handle local file paths correctly
      function loadLocalAudio(filePath) {
        // Clean up previous audio player
        if (audioPlayer) {
          audioPlayer.pause();
          // Remove all event listeners to avoid memory leaks
          audioPlayer.onended = null;
          audioPlayer.onerror = null;
          audioPlayer.oncanplay = null;
          audioPlayer.oncanplaythrough = null;
          audioPlayer.onloadstart = null;
          audioPlayer.src = "";
        }

        // Create new Audio object with local file path
        // Using 'new Audio()' works perfectly with relative/absolute local paths
        audioPlayer = new Audio(filePath);
        currentAudioSrc = filePath;

        // --- Event handlers for local file playback ---
        audioPlayer.onloadstart = () => {
          setStatusMessage(
            `📂 Loading local file: ${getFileNameFromPath(filePath)}...`
          );
        };

        audioPlayer.oncanplay = () => {
          setStatusMessage(`✅ Local audio ready: "${words[currentIndex][0]}"`);
        };

        audioPlayer.oncanplaythrough = () => {
          // Audio is buffered enough to play fully
          setStatusMessage(
            `🎧 Ready to play "${words[currentIndex][0]}" from local storage`
          );
        };

        audioPlayer.onended = () => {
          setStatusMessage(`✓ Finished playing "${words[currentIndex][0]}"`);
        };

        audioPlayer.onerror = (e) => {
          const error = audioPlayer.error;
          let errorMsg = "";
          if (error) {
            switch (error.code) {
              case MediaError.MEDIA_ERR_ABORTED:
                errorMsg = "Playback aborted";
                break;
              case MediaError.MEDIA_ERR_NETWORK:
                errorMsg = "Network error (check file path)";
                break;
              case MediaError.MEDIA_ERR_DECODE:
                errorMsg = "Decoding error (unsupported format)";
                break;
              case MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED:
                errorMsg = `File not found or unsupported: ${getFileNameFromPath(
                  filePath
                )}`;
                break;
              default:
                errorMsg = "Unknown audio error";
            }
          } else {
            errorMsg = `Cannot load local file: ${getFileNameFromPath(
              filePath
            )}`;
          }
          setStatusMessage(
            `❌ ${errorMsg} — check if file exists at: ${filePath}`,
            true
          );
          console.error("Audio load error:", error, "path:", filePath);
        };

        // Trigger load
        audioPlayer.load();

        // Brief success message about local file path
        setStatusMessage(
          `📁 Local file loaded: ${getFileNameFromPath(filePath)}`
        );
      }

      // Update entire UI: dropdown, word display, and load local audio
      function updateUIAndAudio() {
        // Clamp index
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= words.length) currentIndex = words.length - 1;

        const selectedWordData = words[currentIndex];
        const word = selectedWordData[0];
        const audioFilePath = selectedWordData[1];

        // Update displayed word
        currentWordDisplay.textContent = word;

        // Update dropdown selection without triggering event loop
        if (dropdown.value !== word) {
          dropdown.value = word;
        }

        // Load local audio (only if src changed or player missing)
        if (!audioPlayer || currentAudioSrc !== audioFilePath) {
          loadLocalAudio(audioFilePath);
        } else {
          setStatusMessage(`🎵 "${word}" — local file ready`);
        }

        // Enable/disable nav buttons at edges
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === words.length - 1;
      }

      // Change to specific index
      function setCurrentIndex(newIndex) {
        if (newIndex < 0 || newIndex >= words.length) return;
        if (currentIndex === newIndex) return;
        currentIndex = newIndex;
        updateUIAndAudio();

        // Pause any ongoing playback when switching words (better UX)
        if (audioPlayer && !audioPlayer.paused) {
          audioPlayer.pause();
          setStatusMessage(`⏸ Paused, now showing "${words[currentIndex][0]}"`);
        }
      }

      // ---------- Audio Control Functions (local file focused) ----------
      function playAudio() {
        if (!audioPlayer) {
          setStatusMessage("⏳ Audio not initialized, reloading...", false);
          updateUIAndAudio();
          setTimeout(() => {
            if (audioPlayer) {
              playAudio();
            }
          }, 80);
          return;
        }

        // Use Promise catch for autoplay policies / local file errors
        const playPromise = audioPlayer.play();

        if (playPromise !== undefined) {
          playPromise
            .then(() => {
              setStatusMessage(
                `🔊 Now playing "${words[currentIndex][0]}" from local file`
              );
            })
            .catch((err) => {
              console.warn("Playback error on local file:", err);
              // Common issues: file not found, unsupported format, or autoplay blocked
              let friendlyMsg = `Cannot play local file. `;
              if (err.name === "NotSupportedError") {
                friendlyMsg += `Format not supported: ${getFileNameFromPath(
                  words[currentIndex][1]
                )}`;
              } else if (err.name === "NotAllowedError") {
                friendlyMsg += `User interaction required first. Click Play again.`;
              } else {
                friendlyMsg += `File missing? Check path: ${words[currentIndex][1]}`;
              }
              setStatusMessage(`❌ ${friendlyMsg}`, true);
            });
        }
      }

      function pauseAudio() {
        if (audioPlayer && !audioPlayer.paused) {
          audioPlayer.pause();
          setStatusMessage(`⏸ Paused "${words[currentIndex][0]}"`);
        } else if (audioPlayer && audioPlayer.paused) {
          setStatusMessage(`⏸ Already paused (local audio)`);
        } else {
          setStatusMessage(`No active audio loaded`);
        }
      }

      function replayAudio() {
        if (!audioPlayer) {
          setStatusMessage(`⏳ Loading audio first...`);
          updateUIAndAudio();
          setTimeout(() => replayAudio(), 100);
          return;
        }

        // Reset to beginning and play
        audioPlayer.currentTime = 0;

        const playPromise = audioPlayer.play();
        if (playPromise !== undefined) {
          playPromise
            .then(() => {
              setStatusMessage(
                `🔄 Replaying "${words[currentIndex][0]}" from local file`
              );
            })
            .catch((err) => {
              console.error("Replay failed on local file:", err);
              setStatusMessage(
                `⚠️ Replay error: file might be missing or invalid`,
                true
              );
              // Attempt to reload audio completely
              loadLocalAudio(words[currentIndex][1]);
              setTimeout(() => {
                if (audioPlayer) {
                  audioPlayer.currentTime = 0;
                  audioPlayer
                    .play()
                    .catch((e) =>
                      setStatusMessage(`Retry failed: ${e.message}`, true)
                    );
                }
              }, 120);
            });
        }
      }

      // ---------- Dropdown population ----------
      function populateDropdown() {
        dropdown.innerHTML = "";
        words.forEach((item) => {
          const option = document.createElement("option");
          option.value = item[0];
          option.textContent = item[0];
          dropdown.appendChild(option);
        });
        dropdown.value = words[currentIndex][0];
      }

      // ---------- Event Handlers ----------
      function onDropdownChange(e) {
        const selectedWord = e.target.value;
        const foundIndex = words.findIndex((item) => item[0] === selectedWord);
        if (foundIndex !== -1 && foundIndex !== currentIndex) {
          setCurrentIndex(foundIndex);
        }
      }

      function onPrev() {
        if (currentIndex > 0) {
          setCurrentIndex(currentIndex - 1);
        } else {
          setStatusMessage("Already at first word", false);
        }
      }

      function onNext() {
        if (currentIndex < words.length - 1) {
          setCurrentIndex(currentIndex + 1);
        } else {
          setStatusMessage("Already at last word", false);
        }
      }

      // ----- Helper: Show folder setup hint on console once -----
      function showLocalFileHint() {
        console.log("===== LOCAL AUDIO SETUP =====");
        console.log(
          "Update the 'words' array with your local audio file paths."
        );
        console.log("Example structure:");
        words.forEach((w) => {
          console.log(`  "${w[0]}" → ${w[1]}`);
        });
        console.log(
          "If files are missing, you'll see an error in the status bar."
        );
        console.log(
          "Create an 'audio' folder and place .mp3/.wav/.ogg files there."
        );
        console.log("============================");
      }

      // ----- Initialization -----
      function initApp() {
        populateDropdown();
        // Start with first word
        currentIndex = 0;
        updateUIAndAudio();

        // Attach event listeners
        dropdown.addEventListener("change", onDropdownChange);
        prevBtn.addEventListener("click", onPrev);
        nextBtn.addEventListener("click", onNext);
        playBtn.addEventListener("click", playAudio);
        pauseBtn.addEventListener("click", pauseAudio);
        replayBtn.addEventListener("click", replayAudio);

        // Clean up on page unload
        window.addEventListener("beforeunload", () => {
          if (audioPlayer) {
            audioPlayer.pause();
            audioPlayer.src = "";
          }
        });

        setStatusMessage(
          `✅ Local audio player ready — ${words.length} words loaded`
        );
        showLocalFileHint();

        // Extra: add example note if files likely missing (just informative)
        setTimeout(() => {
          // Check if first audio file might be missing (no automatic fetch, just friendly reminder)
          setStatusMessage(
            `💡 Tip: Place audio files at paths shown below each word`,
            false
          );
        }, 1500);
      }

      // Start everything after DOM ready
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initApp);
      } else {
        initApp();
      }

      // Optional: expose for debugging (dev only)
      window.localAudioHelper = {
        reload: updateUIAndAudio,
        getCurrentPath: () => words[currentIndex][1],
        listWords: words,
      };
    </script>
  </body>
</html>
